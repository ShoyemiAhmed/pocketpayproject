<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Send Money | PocketPay</title>

    <link rel="stylesheet" href="css/sendmoney.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <a href="dashboard.html">

            <i class="fa-solid fa-arrow-left"></i>

        </a>

        <h2>Send Money</h2>

    </header>
      
       <!-- Paste Here -->

<form id="sendMoneyForm">

    <label>Recipient Name</label>
    <input
        type="text"
        id="recipient"
        placeholder="Enter recipient name"
    >
         <small class="error" id="recipientError"></small>

    <label>Select Bank</label>

    <select id="bank">

        <option value="">Choose Bank</option>

        <option>Access Bank</option>
        <option>First Bank</option>
        <option>GTBank</option>
        <option>UBA</option>
        <option>Zenith Bank</option>
        <option>Opay</option>
        <option>PalmPay</option>
        <option>Kuda</option>

    </select>
       <small class="error" id="bankError"></small>

    <label>Account Number</label>

    <input
        type="text"
        id="accountNumber"
        placeholder="10-digit account number"
        maxlength="10"
    >
       <small class="error" id="accountError"></small>

    <label>Amount</label>

    <input
        type="number"
        id="amount"
        placeholder="Enter amount"
    >
        <small class="error" id="amountError"></small>

    <label>Description (Optional)</label>

    <textarea
        id="description"
        rows="4"
        placeholder="What's this payment for?"
    ></textarea>

    <button type="submit">

        Continue

    </button>

</form>
      <div class="transfer-summary">
    <h3>Transfer Summary</h3>

    <div class="summary-item">
        <span>Recipient</span>
        <span id="summaryRecipient">-</span>
    </div>

    <div class="summary-item">
        <span>Bank</span>
        <span id="summaryBank">-</span>
    </div>

    <div class="summary-item">
        <span>Amount</span>
        <span id="summaryAmount">₦0.00</span>
    </div>

    <div class="summary-item">
        <span>Transfer Fee</span>
        <span>₦10.00</span>
    </div>

    <hr>

    <div class="summary-item total">
        <span>Total</span>
        <span id="summaryTotal">₦10.00</span>
    </div>
</div>


</div>
<div class="modal" id="confirmModal">

    <div class="modal-content">

        <h2>Confirm Transfer</h2>

        <p><strong>Recipient:</strong> <span id="modalRecipient"></span></p>

        <p><strong>Bank:</strong> <span id="modalBank"></span></p>

        <p><strong>Amount:</strong> <span id="modalAmount"></span></p>

        <p><strong>Transfer Fee:</strong> ₦10.00</p>

        <hr>

        <p><strong>Total:</strong> <span id="modalTotal"></span></p>

        <div class="modal-buttons">

            <button id="cancelBtn">Cancel</button>

            <button id="confirmBtn">Confirm</button>

        </div>

    </div>

</div>

<script src="js/sendmoney.js"></script>
  

</body>

</html>
