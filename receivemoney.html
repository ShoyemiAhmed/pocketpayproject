<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Receive Money | PocketPay</title>

    <link rel="stylesheet" href="css/receivemoney.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="receive-card">

        <h2>
            <i class="fa-solid fa-wallet"></i>
            Receive Money
        </h2>

        <p class="subtitle">
            Share your account details to receive payments.
        </p>

        <div class="account-box">

            <label>Account Name</label>

            <h3>Shoyemi Ahmed</h3>

        </div>

        <div class="account-box">

            <label>Bank</label>

            <h3>PocketPay Bank</h3>

        </div>

        <div class="account-box">

            <label>Account Number</label>

            <h2 id="accountNumber">
                9023456789
            </h2>

            <button id="copyBtn">

                <i class="fa-regular fa-copy"></i>

                Copy Number

            </button>

        </div>

        <div class="qr-section">

            <h3>
                Scan QR Code
            </h3>

            <div class="qr-box" 
            id="qrcode">
            
        </div>

           <button id="downloadQRBtn">
           <i class="fa-solid fa-download"></i>
             Download QR Code
        </button>

            <p>

                Anyone can scan this code to pay you.

            </p>

        </div>

        <a href="dashboard.html"
           class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back to Dashboard

        </a>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="js/receivemoney.js"></script>

</body>
</html>
