<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for an E-Wallet account and start using digital payments">
    <title>Sign Up | PocketPay</title>

    <link rel="stylesheet" href="css/auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="logo">
          <img src="images/pocketpaynew.png" alt="PocketPay Logo">
        </div>
        
        <h1>Create Account</h1>
        <p>Join the future of digital payment</p>
         
         
        <form id="signupForm">

            <label>Full Name</label>
            <input type="text" id="fullname" placeholder="Enter your full name">
               <small class="error" id="fullnameError"></small>

            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
               <small class="error" id="emailError"></small>

            <label>Phone Number</label>
            <div class="phone-input">
                  <span>+234</span>
                  <input 
                 type="tel" 
                 id="phone" 
                 placeholder="Enter your phone number"
                 maxlength="10">
                
            </div>
                <small class="error" id="phoneError"></small>

                 <label>Password</label>

            <div class="password-box">

                        <input 
                         type="password"
                         id="password" 
                         placeholder="Create password"
                         
                    >
                         <span class="toggle-password"
                         onclick="togglePassword('password')">
                           👁️
                        </span>
            </div>
                       <small class="error" id="passwordError"></small>

            <label>Confirm Password</label>

            <div class="password-box">

                <input
                     type="password"
                     id="confirmPassword" 
                     placeholder="Confirm password"
                     
                 >
                    <span class="toggle-password"
                     onclick="togglePassword('confirmPassword')">
                       👁️
                </span>
            </div>
                    <small class="error" id="confirmPasswordError"></small>
                <div class="terms">

                     <input
                     type="checkbox"
                     id="agreeTerms"
             >

            <label for="agreeTerms">
                     I agree to the
                <a href="#">Terms & Conditions</a>
                    and
                      <a href="#">Privacy Policy</a>
                 </label>

            </div>

                 <small class="error" id="termsError"></small>

                 <button type="submit" id="signupBtn">
                       Create Account
                </button>

                <p id="successMessage" class="success"></p>
        </form>

        <p>

            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>
          <script src="js/signup.js"></script>
</body>

</html>
